<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz with Formspree Submission</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .question { margin-bottom: 20px; }
    .options label { display: block; margin: 5px 0; cursor: pointer; }
    #submit-btn { margin-top: 20px; padding: 10px 20px; font-size: 16px; }
    #result { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Quiz</h1>
  
  <form id="quiz-form">
    <div class="question" data-question="1">
      <p>1. What is 2 + 2?</p>
      <div class="options">
        <label><input type="radio" name="q1" value="3"> 3</label>
        <label><input type="radio" name="q1" value="4"> 4</label>
        <label><input type="radio" name="q1" value="5"> 5</label>
      </div>
    </div>

    <div class="question" data-question="2">
      <p>2. What is the capital of France?</p>
      <div class="options">
        <label><input type="radio" name="q2" value="Berlin"> Berlin</label>
        <label><input type="radio" name="q2" value="Paris"> Paris</label>
        <label><input type="radio" name="q2" value="Rome"> Rome</label>
      </div>
    </div>

    <div class="question" data-question="3">
      <p>3. Which planet is known as the Red Planet?</p>
      <div class="options">
        <label><input type="radio" name="q3" value="Mars"> Mars</label>
        <label><input type="radio" name="q3" value="Venus"> Venus</label>
        <label><input type="radio" name="q3" value="Jupiter"> Jupiter</label>
      </div>
    </div>

    <button type="submit" id="submit-btn">Submit Quiz</button>
  </form>

  <div id="result"></div>

  <script>
    const form = document.getElementById('quiz-form');
    const resultDiv = document.getElementById('result');

    // Correct answers
    const correctAnswers = {
      q1: "4",
      q2: "Paris",
      q3: "Mars"
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      let score = 0;

      for (const [question, answer] of Object.entries(correctAnswers)) {
        if (formData.get(question) === answer) {
          score++;
        }
      }

      resultDiv.textContent = `You scored ${score} out of ${Object.keys(correctAnswers).length}`;

      // Send data to Formspree
      const formspreeEndpoint = 'https://formspree.io/f/mlgonwgj';
      const submissionData = new FormData();

      // Add all quiz answers to Formspree submission
      formData.forEach((value, key) => {
        submissionData.append(key, value);
      });

      submissionData.append('score', score);

      try {
        const response = await fetch(formspreeEndpoint, {
          method: 'POST',
          body: submissionData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          console.log('Form submitted successfully!');
        } else {
          console.error('Form submission failed.');
        }
      } catch (error) {
        console.error('Error submitting form:', error);
      }
    });
  </script>

</body>
</html>
